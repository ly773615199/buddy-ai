name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest (backend)
        run: npx vitest run --reporter=verbose

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run vitest (frontend)
        run: cd frontend && npx vitest run --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Mock LLM)
        run: npx playwright test --project=chromium --reporter=list
        env:
          BUDDY_MOCK_LLM: '1'
          BUDDY_SKIP_SUBSCRIPTION: '1'
          BUDDY_PROCESSING_TIMEOUT_MS: '15000'

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload E2E traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 3

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: e2e/**/*-snapshots/
          retention-days: 7

  test-e2e-real-llm:
    runs-on: ubuntu-latest
    needs: [test-e2e]
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Real LLM)
        run: npx playwright test --project=real-llm --reporter=list
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          BUDDY_SKIP_SUBSCRIPTION: '1'
          BUDDY_PROCESSING_TIMEOUT_MS: '30000'

      - name: Upload real-llm report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-real-llm
          path: playwright-report/
          retention-days: 7

  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Sync i18n translations (auto-supplement)
        run: cd frontend && npx vite build 2>&1 | grep -A 50 "i18n\|同步"
        env:
          CI: 'true'
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Check i18n translation coverage
        run: npm run i18n:check
        env:
          CI: 'true'

      - name: Commit updated translations
        if: success() && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/i18n/locales/
          git diff --cached --quiet || git commit -m "chore(i18n): auto-sync translations [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, i18n-check]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: npm run build:frontend

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint
