<!--
  Buddy 桌面浮窗 — 透明背景 + Pixi.js 粒子渲染
  
  光灵在屏幕上自由移动，响应鼠标交互。
  双击打开主窗口，右键显示快捷菜单。
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Buddy Sprite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #sprite-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
    }
    /* 拖拽区域 — 整个窗口 */
    body { -webkit-app-region: drag; }
    /* 点击交互区域 — 光灵本身 */
    #sprite-container { -webkit-app-region: no-drag; }
  </style>
</head>
<body>
  <div id="sprite-container"></div>

  <script>
    // ==================== Pixi.js 粒子渲染 ====================
    // 从主窗口同步状态，独立渲染光灵粒子

    const container = document.getElementById('sprite-container');
    const SIZE = 160;
    let pixiApp = null;
    let currentState = {
      mood: 'neutral',
      energy: 0.5,
      satisfaction: 0.5,
      curiosity: 0.3,
      stage: 'formed',
      primaryColor: '#58a6ff',
      secondaryColor: '#a371f7',
      texture: 'soft',
      temperament: 'warm',
    };

    // 简化的粒子渲染器（桌面浮窗专用）
    function initPixi() {
      // 动态加载 pixi.js
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js';
      script.onload = () => {
        const app = new PIXI.Application({
          width: SIZE,
          height: SIZE,
          backgroundColor: 0x000000,
          backgroundAlpha: 0,
          antialias: true,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true,
        });
        container.appendChild(app.view);
        pixiApp = app;
        startRendering(app);
      };
      document.head.appendChild(script);
    }

    function startRendering(app) {
      const cx = SIZE / 2;
      const cy = SIZE / 2;
      let tick = 0;

      const glowLayer = new PIXI.Graphics();
      const orbLayer = new PIXI.Graphics();
      const particleContainer = new PIXI.Container();
      app.stage.addChild(glowLayer);
      app.stage.addChild(orbLayer);
      app.stage.addChild(particleContainer);

      const particles = [];

      function hexToNum(hex) {
        return parseInt(hex.replace('#', ''), 16);
      }

      function spawnParticle(color, count) {
        for (let i = 0; i < count; i++) {
          const gfx = new PIXI.Graphics();
          const size = 1.5 + Math.random() * 2;
          gfx.beginFill(color, 0.7);
          gfx.drawCircle(0, 0, size);
          gfx.endFill();
          gfx.x = cx + (Math.random() - 0.5) * 40;
          gfx.y = cy + (Math.random() - 0.5) * 30;
          particleContainer.addChild(gfx);
          particles.push({
            gfx,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -(0.3 + Math.random() * 0.6),
            life: 60 + Math.random() * 40,
            age: 0,
          });
        }
      }

      // 情绪参数
      function getEmotionMod() {
        const m = currentState.mood;
        const e = currentState.energy;
        if (m === 'excited' || m === 'happy') return { speedMul: 1.3 + e * 0.5, spawnRate: 8, glowMul: 1.3 };
        if (m === 'tired' || m === 'sad') return { speedMul: 0.5, spawnRate: 25, glowMul: 0.6 };
        if (m === 'angry') return { speedMul: 1.8, spawnRate: 5, glowMul: 1.5 };
        if (m === 'calm') return { speedMul: 0.7, spawnRate: 18, glowMul: 0.8 };
        return { speedMul: 1, spawnRate: 15, glowMul: 1 };
      }

      app.ticker.add(() => {
        tick++;
        const primary = hexToNum(currentState.primaryColor);
        const em = getEmotionMod();
        const breath = Math.sin(tick * 0.025);
        const baseAlpha = (0.8 + breath * 0.2) * em.glowMul;

        glowLayer.clear();
        orbLayer.clear();

        // 光晕
        for (let i = 4; i >= 0; i--) {
          const ratio = i / 4;
          glowLayer.beginFill(primary, (1 - ratio) * 0.05 * em.glowMul);
          glowLayer.drawCircle(cx, cy, 30 * (0.5 + ratio * 0.5));
          glowLayer.endFill();
        }

        // 光团
        const orbR = 22 + breath * 2;
        for (let i = 5; i >= 0; i--) {
          const ratio = i / 5;
          orbLayer.beginFill(primary, baseAlpha * 0.5 * (1 - ratio * 0.3));
          orbLayer.drawCircle(cx, cy, orbR * (0.3 + ratio * 0.7));
          orbLayer.endFill();
        }
        orbLayer.beginFill(0xffffff, 0.15 * baseAlpha);
        orbLayer.drawCircle(cx - 4, cy - 6, orbR * 0.2);
        orbLayer.endFill();

        // 粒子
        if (tick % em.spawnRate === 0) spawnParticle(primary, 2);

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.age++;
          p.gfx.x += p.vx * em.speedMul;
          p.gfx.y += p.vy * em.speedMul;
          const lifeRatio = 1 - p.age / p.life;
          p.gfx.alpha = lifeRatio;
          p.gfx.scale.set(lifeRatio);
          if (p.age >= p.life) {
            particleContainer.removeChild(p.gfx);
            p.gfx.destroy();
            particles.splice(i, 1);
          }
        }
      });
    }

    // ==================== IPC 通信 ====================

    // 接收来自主窗口的状态更新
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'state_update') {
        Object.assign(currentState, event.data.state);
      }
    });

    // Electron IPC（如果可用）
    if (window.electronAPI) {
      window.electronAPI.onStateUpdate?.((state) => {
        Object.assign(currentState, state);
      });

      // Sprint 5: 感知事件驱动光灵反应
      window.electronAPI.onPerceptionEvent?.((event) => {
        handlePerceptionEvent(event);
      });

      // Sprint 6: 自主行为事件
      window.electronAPI.onBehaviorEvent?.((event) => {
        handleBehaviorEvent(event);
      });

      // Sprint 6: 窗口感知事件
      window.electronAPI.onWindowAwareness?.((event) => {
        handleWindowAwareness(event);
      });
    }

    // Sprint 6: 自主行为处理
    function handleBehaviorEvent(event) {
      if (!pixiApp) return;

      switch (event.type) {
        case 'random_action': {
          // 随机动作 → 粒子特效
          const primary = hexToNum(currentState.primaryColor);
          for (let i = 0; i < 4; i++) {
            const gfx = new PIXI.Graphics();
            gfx.beginFill(primary, 0.7);
            gfx.drawCircle(0, 0, 2 + Math.random() * 2);
            gfx.endFill();
            gfx.x = SIZE / 2 + (Math.random() - 0.5) * 40;
            gfx.y = SIZE / 2 + (Math.random() - 0.5) * 30;
            pixiApp.stage.addChild(gfx);
            const vy = -(1 + Math.random() * 1.5);
            let age = 0;
            const onTick = () => {
              age++;
              gfx.y += vy;
              gfx.alpha = Math.max(0, 1 - age / 20);
              if (age >= 20) {
                pixiApp.ticker.remove(onTick);
                pixiApp.stage.removeChild(gfx);
                gfx.destroy();
              }
            };
            pixiApp.ticker.add(onTick);
          }
          break;
        }
        case 'drowsy': {
          // 犯困 → 变暗
          currentState._brightnessMul = 0.7;
          break;
        }
        case 'sleep': {
          // 睡眠 → 很暗很慢
          currentState._brightnessMul = 0.4;
          currentState._speedMul = 0.3;
          break;
        }
        case 'wake': {
          // 醒来 → 恢复
          currentState._brightnessMul = 1.0;
          currentState._speedMul = 1.0;
          break;
        }
      }
    }

    // Sprint 6: 窗口感知处理
    function handleWindowAwareness(event) {
      if (event.color) {
        // 应用颜色偏移
        currentState._appColor = event.color;
        currentState._appCategory = event.category;
      }
    }

    // Sprint 5: 感知事件处理
    function handlePerceptionEvent(event) {
      // 情绪影响
      if (event.mood) {
        currentState.mood = event.mood;
      }

      // 粒子效果
      const effect = event.particleEffect || event.reaction;
      if (effect && pixiApp) {
        const color = event.particleColor
          ? hexToNum(event.particleColor)
          : hexToNum(currentState.primaryColor);
        const flashCount = event.flashCount || 3;

        for (let i = 0; i < flashCount; i++) {
          const gfx = new PIXI.Graphics();
          gfx.beginFill(color, 0.8);
          gfx.drawCircle(0, 0, 2 + Math.random() * 3);
          gfx.endFill();
          gfx.x = SIZE / 2 + (Math.random() - 0.5) * 50;
          gfx.y = SIZE / 2 + (Math.random() - 0.5) * 40;
          pixiApp.stage.addChild(gfx);
          const vy = -(1.5 + Math.random() * 2);
          let age = 0;
          const onTick = () => {
            age++;
            gfx.y += vy;
            gfx.alpha = Math.max(0, 1 - age / 25);
            if (age >= 25) {
              pixiApp.ticker.remove(onTick);
              pixiApp.stage.removeChild(gfx);
              gfx.destroy();
            }
          };
          pixiApp.ticker.add(onTick);
        }

        // alert_flash: 整体闪烁
        if (effect === 'alert_flash') {
          const overlay = new PIXI.Graphics();
          overlay.beginFill(0xff4444, 0.3);
          overlay.drawRect(0, 0, SIZE, SIZE);
          overlay.endFill();
          pixiApp.stage.addChild(overlay);
          let fadeAge = 0;
          const fadeTick = () => {
            fadeAge++;
            overlay.alpha = Math.max(0, 0.3 - fadeAge / 20);
            if (fadeAge >= 6) {
              pixiApp.ticker.remove(fadeTick);
              pixiApp.stage.removeChild(overlay);
              overlay.destroy();
            }
          };
          pixiApp.ticker.add(fadeTick);
        }
      }

      // 速度影响
      if (event.particleSpeedMul) {
        currentState._speedMul = event.particleSpeedMul;
        // 自动恢复
        setTimeout(() => { currentState._speedMul = 1; }, 3000);
      }
    }

    // ==================== 鼠标交互 ====================

    let clickTimer = null;
    let isDragging = false;

    container.addEventListener('mousedown', (e) => {
      isDragging = false;
    });

    container.addEventListener('mousemove', (e) => {
      if (e.buttons === 1) isDragging = true;
    });

    container.addEventListener('click', (e) => {
      if (isDragging) return;
      // 单击 — 触发光灵反应
      if (pixiApp) {
        const primary = hexToNum(currentState.primaryColor);
        for (let i = 0; i < 6; i++) {
          const gfx = new PIXI.Graphics();
          gfx.beginFill(primary, 0.8);
          gfx.drawCircle(0, 0, 2 + Math.random() * 2);
          gfx.endFill();
          gfx.x = SIZE / 2 + (Math.random() - 0.5) * 30;
          gfx.y = SIZE / 2 + (Math.random() - 0.5) * 20;
          pixiApp.stage.addChild(gfx);
          const vy = -(1 + Math.random() * 2);
          let age = 0;
          const onTick = () => {
            age++;
            gfx.y += vy;
            gfx.alpha = Math.max(0, 1 - age / 30);
            if (age >= 30) {
              pixiApp.ticker.remove(onTick);
              pixiApp.stage.removeChild(gfx);
              gfx.destroy();
            }
          };
          pixiApp.ticker.add(onTick);
        }
      }
    });

    // 双击 — 打开主窗口
    container.addEventListener('dblclick', (e) => {
      e.preventDefault();
      // 通知主进程打开主窗口
      if (window.electronAPI?.openMainWindow) {
        window.electronAPI.openMainWindow();
      } else {
        window.parent?.postMessage({ type: 'open_main_window' }, '*');
      }
    });

    // 右键 — 快捷菜单
    container.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (window.electronAPI?.showContextMenu) {
        window.electronAPI.showContextMenu();
      }
    });

    // ==================== 初始化 ====================
    initPixi();

    // 通知主进程浮窗已就绪
    window.parent?.postMessage({ type: 'floating_ready' }, '*');
  </script>
</body>
</html>
