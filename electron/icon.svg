<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- 内部光晕 -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.5"/>
  <!-- 精灵身体（抽象狐狸/精灵轮廓） -->
  <g transform="translate(256,240)">
    <!-- 左耳 -->
    <path d="M-90,-120 Q-110,-180 -60,-160 Q-30,-145 -40,-100 Z" fill="#c4b5fd" opacity="0.9"/>
    <!-- 右耳 -->
    <path d="M90,-120 Q110,-180 60,-160 Q30,-145 40,-100 Z" fill="#c4b5fd" opacity="0.9"/>
    <!-- 头部 -->
    <ellipse cx="0" cy="-40" rx="100" ry="90" fill="#e0e7ff"/>
    <!-- 左眼 -->
    <ellipse cx="-35" cy="-50" rx="18" ry="20" fill="#1e1b4b"/>
    <circle cx="-30" cy="-55" r="6" fill="white"/>
    <!-- 右眼 -->
    <ellipse cx="35" cy="-50" rx="18" ry="20" fill="#1e1b4b"/>
    <circle cx="40" cy="-55" r="6" fill="white"/>
    <!-- 嘴巴 -->
    <path d="M-15,-15 Q0,0 15,-15" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="80" rx="75" ry="70" fill="#e0e7ff"/>
    <!-- 领结/装饰 -->
    <circle cx="0" cy="30" r="12" fill="#6366f1"/>
    <circle cx="0" cy="30" r="6" fill="#a78bfa"/>
  </g>
  <!-- 底部光点 -->
  <circle cx="256" cy="420" r="8" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="220" cy="440" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="292" cy="440" r="4" fill="#a78bfa" opacity="0.5"/>
</svg>
