apply plugin: 'com.android.application'

// 从 package.json 读取版本号
def packageJson = new File(rootProject.projectDir.parentFile, 'package.json')
def versionString = '0.0.0'
if (packageJson.exists()) {
    def pkg = new groovy.json.JsonSlurper().parseText(packageJson.text)
    versionString = pkg.version ?: '0.0.0'
}
def versionParts = versionString.tokenize('.')
def versionMajor = versionParts.size() > 0 ? versionParts[0].toInteger() : 0
def versionMinor = versionParts.size() > 1 ? versionParts[1].toInteger() : 0
def versionPatch = versionParts.size() > 2 ? versionParts[2].replaceAll(/[^0-9]/, '').toInteger() : 0
def versionCodeCalc = versionMajor * 10000 + versionMinor * 100 + versionPatch

android {
    namespace = "com.buddy.ai"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.buddy.ai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode versionCodeCalc
        versionName versionString
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            // CI 构建使用环境变量中的 keystore
            def ksFile = System.getenv('ANDROID_KEYSTORE_FILE')
            if (ksFile && file(ksFile).exists()) {
                storeFile file(ksFile)
                storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('ANDROID_KEY_ALIAS') ?: ''
                keyPassword System.getenv('ANDROID_KEY_PASSWORD') ?: ''
                storeType System.getenv('ANDROID_KEYSTORE_TYPE') ?: 'JKS'
            }
        }
    }

    buildTypes {
        debug {
            // debug 用默认 debug keystore
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // 有 keystore 就签名，没有就跳过（CI 可用 debug 签名打包）
            def ksFile = System.getenv('ANDROID_KEYSTORE_FILE')
            if (ksFile && file(ksFile).exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // CameraX（原生摄像头桥依赖）
    def cameraxVersion = "1.4.1"
    implementation "androidx.camera:camera-core:${cameraxVersion}"
    implementation "androidx.camera:camera-camera2:${cameraxVersion}"
    implementation "androidx.camera:camera-lifecycle:${cameraxVersion}"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
